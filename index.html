<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PBZ Weather Terminal</title>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root {
  --bg:#050805;
  --panel:#0b130b;
  --text:#66ff99;
  --border:#1f3a1f;
  --warn:#ffcc00;
  --severe:#ff3b3b;
}

body {
  margin:0;
  font-family: monospace;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  padding:10px;
  text-align:center;
  border-bottom:1px solid var(--border);
}

/* LAYOUT */
.container {
  padding:10px;
  display:grid;
  gap:10px;
}

.section {
  border:1px solid var(--border);
  background: var(--panel);
  padding:10px;
}

h2 {
  font-size:13px;
  margin:0 0 8px;
  border-bottom:1px solid var(--border);
}

/* CARDS */
.card {
  border:1px solid var(--border);
  padding:8px;
  margin-bottom:8px;
  font-size:12px;
  white-space:pre-wrap;
}

/* MAP */
#radarMap {
  height: 360px;
  width: 100%;
  border: 1px solid var(--border);
}

/* MOBILE */
@media(max-width:768px){
  #radarMap { height: 300px; }
}
</style>
</head>

<body>

<header>
PBZ WEATHER TERMINAL — LIVE RADAR STACK
</header>

<div class="container">

<div class="section">
  <h2>LIVE RADAR STACK</h2>
  <div id="radarMap"></div>
</div>

</div>

<script>

let map;

/* -------------------------
   RADAR STACK INIT
------------------------- */
function initRadarMap(){

  map = L.map("radarMap", {
    zoomControl: true
  }).setView([40.44, -79.99], 7);

  /* BASE MAP (dark feel) */
  const base = L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
      opacity: 0.2
    }
  ).addTo(map);

  /* =========================
     RADAR STACK LAYERS
  ========================= */

  // 1. Reflectivity (PRIMARY RADAR)
  const reflectivity = L.tileLayer(
    "https://mapservices.weather.noaa.gov/vector/rest/services/radar/radar_base_reflectivity/MapServer/tile/{z}/{y}/{x}",
    {
      opacity: 0.65
    }
  ).addTo(map);

  // 2. Velocity (storm motion)
  const velocity = L.tileLayer(
    "https://mapservices.weather.noaa.gov/vector/rest/services/radar/radar_base_velocity/MapServer/tile/{z}/{y}/{x}",
    {
      opacity: 0.65
    }
  );

  // 3. Composite (broader radar context)
  const mosaic = L.tileLayer(
    "https://mapservices.weather.noaa.gov/vector/rest/services/radar/radar_mosaic/MapServer/tile/{z}/{y}/{x}",
    {
      opacity: 0.6
    }
  );

  // 4. Satellite (GOES GeoColor-style proxy)
  const satellite = L.tileLayer(
    "https://cdn.star.nesdis.noaa.gov/GOES16/ABI/SECTOR/cgl/GEOCOLOR/{z}/{x}/{y}.jpg",
    {
      opacity: 0.5
    }
  );

  /* -------------------------
     LAYER CONTROL (RADAR STACK)
  ------------------------- */
  L.control.layers(
    {
      "Reflectivity (PBZ)": reflectivity,
      "Velocity": velocity,
      "Radar Mosaic": mosaic,
      "Satellite": satellite
    },
    null,
    { collapsed: false }
  ).addTo(map);
}

/* INIT */
initRadarMap();

</script>

</body>
</html>
