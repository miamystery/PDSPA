<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PBZ Weather Terminal</title>

<style>
:root {
  --bg:#050805;
  --panel:#0b130b;
  --text:#66ff99;
  --border:#1f3a1f;
  --warn:#ffcc00;
  --severe:#ff3b3b;
}

/* GLOBAL */
body {
  margin:0;
  font-family: monospace;
  background: var(--bg);
  color: var(--text);
}

/* TICKER */
.ticker {
  position: fixed;
  top: 0;
  width: 100%;
  background: #000;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  z-index: 999;
}

.ticker span {
  display: inline-block;
  white-space: nowrap;
  padding-left: 100%;
  animation: scroll 22s linear infinite;
  font-size: 12px;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* HEADER */
header {
  margin-top: 28px;
  padding: 10px;
  text-align:center;
  border-bottom:1px solid var(--border);
}

/* LAYOUT */
.container {
  padding:10px;
  display:grid;
  gap:10px;
}

/* SECTIONS */
.section {
  border:1px solid var(--border);
  background: var(--panel);
  padding:10px;
  border-radius:4px;
}

h2 {
  font-size:13px;
  margin:0 0 8px;
  border-bottom:1px solid var(--border);
  padding-bottom:4px;
}

/* BOXES */
#warningBox {
  border-color: var(--severe);
}

#watchBox {
  border-color: var(--warn);
}

#warningBox h2 {
  color: var(--severe);
}

#watchBox h2 {
  color: var(--warn);
}

/* CARDS */
.card {
  border:1px solid var(--border);
  padding:8px;
  margin-bottom:8px;
  font-size:12px;
  white-space: pre-wrap;
  word-break: break-word;
  border-radius:4px;
}

.severe {
  border-color: var(--severe);
}

.warning {
  border-color: var(--warn);
}

/* RADAR */
.grid {
  display:grid;
  gap:10px;
}

img {
  width:100%;
  border:1px solid var(--border);
  border-radius:4px;
}

/* MOBILE */
@media (min-width: 768px) {
  .grid-two {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>

<body>

<!-- TICKER -->
<div class="ticker">
  <span id="tickerText">Loading PBZ feeds...</span>
</div>

<header>
  PBZ WEATHER TERMINAL — ALLEGHENY / WESTMORELAND FILTER
</header>

<div class="container">

  <!-- WARNING BOX -->
  <div class="section" id="warningBox">
    <h2>WARNING BOX (IMMEDIATE ACTION)</h2>
    <div id="warnings"></div>
  </div>

  <!-- WATCH BOX -->
  <div class="section" id="watchBox">
    <h2>WATCH BOX (CONDITIONS POSSIBLE)</h2>
    <div id="watches"></div>
  </div>

  <!-- PBZ PRODUCTS -->
  <div class="section">
    <h2>PBZ PRODUCTS (WCNPBZ / FFAPBZ / ETC)</h2>
    <div id="products"></div>
  </div>

  <!-- STORM REPORTS -->
  <div class="section">
    <h2>SEVERE STORM REPORTS (LSRPBZ)</h2>
    <div id="reports"></div>
  </div>

  <!-- RADAR -->
  <div class="section">
    <h2>RADAR / SATELLITE</h2>

    <div class="grid">
      <img src="https://radar.weather.gov/ridge/standard/KCCX_loop.gif">
      <img src="https://www.star.nesdis.noaa.gov/GOES/wfo.php?wfo=ctp">
    </div>

    <div class="grid grid-two" style="margin-top:10px;">
      <img src="https://radar.weather.gov/ridge/standard/KPBZ_loop.gif">
      <img src="https://radar.weather.gov/ridge/standard/KPBZ_VEL_loop.gif">
    </div>
  </div>

</div>

<script>

/* -------------------------
   CONFIG
------------------------- */
const COUNTIES = ["Allegheny", "Westmoreland"];
const REFRESH_MS = 90000;

let tickerItems = [];

/* -------------------------
   COUNTY FILTER
------------------------- */
function countyMatch(feature) {
  const areas = feature.properties.areaDesc || "";
  return COUNTIES.some(c => areas.includes(c));
}

/* -------------------------
   ALERT LOADING
------------------------- */
async function loadAlerts() {
  const url = "https://api.weather.gov/alerts/active?point=40.4406,-79.9959";
  const res = await fetch(url);
  const data = await res.json();

  const warningsBox = document.getElementById("warnings");
  const watchesBox = document.getElementById("watches");

  warningsBox.innerHTML = "";
  watchesBox.innerHTML = "";
  tickerItems = [];

  data.features.forEach(f => {
    if (!countyMatch(f)) return;

    const p = f.properties;
    const event = p.event || "";

    const card = document.createElement("div");
    card.className = "card";

    card.textContent =
`${event}
Areas: ${p.areaDesc}
Issued: ${p.sent}
Expires: ${p.ends || "N/A"}

${p.headline || ""}`;

    const isWarning =
      event.includes("Warning") &&
      (event.includes("Tornado") ||
       event.includes("Severe") ||
       event.includes("Flash Flood"));

    const isWatch = event.includes("Watch");

    if (isWarning) {
      card.classList.add("severe");
      warningsBox.appendChild(card);
      tickerItems.push("WARNING: " + event);
    }

    else if (isWatch) {
      card.classList.add("warning");
      watchesBox.appendChild(card);
      tickerItems.push("WATCH: " + event);
    }

    else {
      watchesBox.appendChild(card);
    }
  });

  updateTicker();
}

/* -------------------------
   PBZ PRODUCTS
------------------------- */
async function loadProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  const url = "https://api.weather.gov/products?wfo=PBZ&limit=10";
  const res = await fetch(url);
  const data = await res.json();

  data["@graph"]?.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    const code = p.productCode || "PBZ PRODUCT";

    if (code.includes("TOR") || code.includes("SVR")) {
      card.classList.add("severe");
    }
    if (code.includes("FF") || code.includes("FL")) {
      card.classList.add("warning");
    }

    card.textContent =
`${code}
Issued: ${p.issuanceTime || "N/A"}

${(p.productText || "").slice(0, 900)}`;

    container.appendChild(card);

    tickerItems.push(code);
  });

  updateTicker();
}

/* -------------------------
   STORM REPORTS (LSR)
------------------------- */
async function loadReports() {
  const container = document.getElementById("reports");
  container.innerHTML = "";

  const url = "https://api.weather.gov/products/types/LSR/locations/PBZ";
  const res = await fetch(url);
  const data = await res.json();

  data["@graph"]?.slice(0, 10).forEach(r => {
    const card = document.createElement("div");
    card.className = "card";

    card.textContent =
`LSR REPORT
Issued: ${r.issuanceTime || "N/A"}

${(r.productText || "").slice(0, 800)}`;

    container.appendChild(card);
  });
}

/* -------------------------
   TICKER
------------------------- */
function updateTicker() {
  const el = document.getElementById("tickerText");
  el.textContent = tickerItems.length
    ? tickerItems.join("  |  ")
    : "No active hazards in selected counties";
}

/* -------------------------
   MASTER REFRESH
------------------------- */
async function refreshAll() {
  await loadAlerts();
  await loadProducts();
  await loadReports();
}

/* INIT */
refreshAll();
setInterval(refreshAll, REFRESH_MS);

</script>

</body>
</html>
