<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PBZ Weather Terminal</title>

<style>
:root {
  --bg:#050805;
  --panel:#0b130b;
  --text:#66ff99;
  --border:#1f3a1f;
  --warn:#ffcc00;
  --severe:#ff3b3b;
}

body {
  margin:0;
  font-family: monospace;
  background: var(--bg);
  color: var(--text);
}

/* TICKER */
.ticker {
  position: fixed;
  top: 0;
  width: 100%;
  background: #000;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  z-index: 999;
}
.ticker span {
  display:inline-block;
  white-space:nowrap;
  padding-left:100%;
  animation:scroll 20s linear infinite;
  font-size:12px;
}
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

header {
  margin-top:28px;
  padding:10px;
  text-align:center;
  border-bottom:1px solid var(--border);
}

.container {
  padding:10px;
  display:grid;
  gap:10px;
}

.section {
  border:1px solid var(--border);
  background: var(--panel);
  padding:10px;
}

h2 {
  font-size:13px;
  margin:0 0 8px;
  border-bottom:1px solid var(--border);
}

/* WATCH / WARNING */
#warningBox { border-color: var(--severe); }
#watchBox { border-color: var(--warn); }

#warningBox h2 { color: var(--severe); }
#watchBox h2 { color: var(--warn); }

/* CARDS */
.card {
  border:1px solid var(--border);
  padding:8px;
  margin-bottom:8px;
  font-size:12px;
  white-space: pre-wrap;
  word-break: break-word;
  cursor:pointer;
}

.severe { border-color: var(--severe); }
.warning { border-color: var(--warn); }

/* LSR EXPAND */
.lsr-body {
  display:none;
  margin-top:8px;
}
.card.open .lsr-body {
  display:block;
}

/* RADAR GRID */
.radar-grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:8px;
}

.radar-grid img {
  width:100%;
  height:140px;
  object-fit:cover;
  border:1px solid var(--border);
  cursor:pointer;
}

/* FULLSCREEN */
#overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}
#overlay img {
  width:100%;
  max-height:100%;
  object-fit:contain;
}
#overlay.active {
  display:flex;
}
#closeBtn {
  position:absolute;
  top:10px;
  right:15px;
  color:#66ff99;
  border:1px solid #66ff99;
  padding:4px 8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="ticker">
  <span id="tickerText">Loading...</span>
</div>

<header>
PBZ WEATHER TERMINAL — ALLEGHENY / WESTMORELAND
</header>

<div class="container">

<!-- WARNING -->
<div class="section" id="warningBox">
<h2>WARNING BOX</h2>
<div id="warnings"></div>
</div>

<!-- WATCH -->
<div class="section" id="watchBox">
<h2>WATCH BOX</h2>
<div id="watches"></div>
</div>

<!-- PRODUCTS -->
<div class="section">
<h2>PBZ PRODUCTS</h2>
<div id="products"></div>
</div>

<!-- LSR -->
<div class="section">
<h2>STORM REPORTS</h2>
<div id="reports"></div>
</div>

<div class="section">
  <h2>RADAR / SATELLITE</h2>

  <div class="radar-grid">

    <!-- PBZ RADAR (STABLE RIDGE ENDPOINT) -->
    <img src="https://radar.weather.gov/ridge/standard/PBZ_loop.gif" alt="PBZ Radar">

    <!-- GEO COLOR (PA / Great Lakes view) -->
    <img src="https://cdn.star.nesdis.noaa.gov/GOES16/ABI/SECTOR/cgl/GEOCOLOR/latest.jpg" alt="GeoColor">

    <!-- REGIONAL RADAR (STABLE FALLBACK) -->
    <img src="https://radar.weather.gov/ridge/standard/CCX_loop.gif" alt="Regional Radar">

    <!-- GLM LIGHTNING (WORKING CDN) -->
    <img src="https://cdn.star.nesdis.noaa.gov/GOES19/GLM/SECTOR/cgl/EXTENT3/latest.jpg" alt="GLM Lightning">

  </div>
</div>

</div>

</div>

<!-- FULLSCREEN -->
<div id="overlay">
<div id="closeBtn">X</div>
<img id="overlayImg">
</div>

<script>

const COUNTIES = ["Allegheny","Westmoreland"];
const REFRESH_MS = 90000;
let tickerItems = [];

function countyMatch(f){
  return COUNTIES.some(c=> (f.properties.areaDesc||"").includes(c));
}

/* ALERTS */
async function loadAlerts(){
  const res = await fetch("https://api.weather.gov/alerts/active?point=40.44,-79.99");
  const data = await res.json();

  const warn = document.getElementById("warnings");
  const watch = document.getElementById("watches");

  warn.innerHTML="";
  watch.innerHTML="";
  tickerItems=[];

  data.features.forEach(f=>{
    if(!countyMatch(f)) return;
    const p=f.properties;

    const div=document.createElement("div");
    div.className="card";
    div.textContent=`${p.event}\n${p.areaDesc}`;

    if(p.event.includes("Warning")){
      div.classList.add("severe");
      warn.appendChild(div);
      tickerItems.push("WARNING: "+p.event);
    } else {
      watch.appendChild(div);
      tickerItems.push("WATCH: "+p.event);
    }
  });

  updateTicker();
}

/* PRODUCTS */
async function loadProducts(){
  const el=document.getElementById("products");
  el.innerHTML="";

  const res=await fetch("https://api.weather.gov/products?wfo=PBZ&limit=8");
  const data=await res.json();

  data["@graph"]?.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";
    div.textContent=`${p.productCode}\n${p.issuanceTime}`;
    el.appendChild(div);
  });
}

/* LSR */
async function loadReports(){
  const el=document.getElementById("reports");
  el.innerHTML="";

  const list=await fetch("https://api.weather.gov/products/types/LSR/locations/PBZ");
  const data=await list.json();

  const items=data["@graph"]?.slice(0,5)||[];

  for(const i of items){
    const res=await fetch(i["@id"]);
    const d=await res.json();

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`LSR\n${d.issuanceTime}
<div class="lsr-body">${d.productText}</div>`;

    div.onclick=()=>div.classList.toggle("open");

    el.appendChild(div);
  }
}

/* TICKER */
function updateTicker(){
  document.getElementById("tickerText").textContent=
    tickerItems.join(" | ") || "No hazards";
}

/* FULLSCREEN RADAR */
function enableFullscreen(){
  const imgs=document.querySelectorAll(".radar-grid img");
  const overlay=document.getElementById("overlay");
  const overlayImg=document.getElementById("overlayImg");

  imgs.forEach(img=>{
    img.onclick=()=>{
      overlayImg.src=img.src;
      overlay.classList.add("active");
    };
  });

  document.getElementById("closeBtn").onclick=()=>{
    overlay.classList.remove("active");
  };

  overlay.onclick=(e)=>{
    if(e.target===overlay) overlay.classList.remove("active");
  };
}

/* INIT */
async function init(){
  await loadAlerts();
  await loadProducts();
  await loadReports();
  enableFullscreen();
}

init();
setInterval(init, REFRESH_MS);

</script>

</body>
</html>
